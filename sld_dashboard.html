<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>COTELCO — SCADA Live</title>
<style>
:root{
  --blue:#0a5ca8;--blue-dk:#073e73;--blue-lt:#eaf2fb;
  --green:#1a9b4c;--green-lt:#e7f7ee;
  --amber:#b8860b;--red:#c0392b;--red-lt:#fdeceb;
  --bg:#f4f6f9;--panel:#ffffff;--panel-2:#f8fafc;
  --line:#e2e8f0;--ink:#1e293b;--ink-soft:#64748b;--ink-faint:#94a3b8;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;padding:18px;max-width:1500px;margin:0 auto}

/* ── Header ── */
#head{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;background:var(--panel);padding:14px 20px;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--line)}
#logo{width:50px;height:50px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(15,23,42,.15);border:1px solid var(--line);overflow:hidden}
#logo img{width:100%;height:100%;object-fit:contain}
#logo span{color:var(--blue-dk);font-weight:800;font-size:12px;letter-spacing:.5px}
#brand{display:flex;flex-direction:column;line-height:1.15}
#brand .co{font-size:15px;font-weight:800;color:var(--blue-dk);letter-spacing:.5px}
#brand .sub-title{font-size:11px;color:var(--ink-soft);font-weight:500}
#head h1{font-size:14px;font-weight:700;color:var(--ink-soft);letter-spacing:.6px;margin-left:auto;text-transform:uppercase}
#head #ts{font-size:12px;color:var(--ink-faint);font-family:'SF Mono',Consolas,monospace}
#head #stat{padding:4px 13px;border-radius:20px;font-size:11px;font-weight:700;font-family:'SF Mono',Consolas,monospace;letter-spacing:.5px}
.on{background:var(--green-lt);color:#0f7a3a;border:1px solid #b7e4c7}
.off{background:var(--red-lt);color:var(--red);border:1px solid #f3c6c1}

/* ── Summary KPI row ── */
#kpi-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.kpi{background:var(--panel);border-radius:12px;padding:16px 20px;min-width:160px;flex:1;border-top:3px solid var(--line);box-shadow:var(--shadow)}
.kpi .lbl{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:700}
.kpi .val{font-size:24px;font-weight:800;font-family:'SF Mono',Consolas,monospace}
.kpi .sub{font-size:11.5px;color:var(--ink-faint);margin-top:3px;font-weight:500}

/* ── Substation groups ── */
.sub{background:var(--panel);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line)}
.sub-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--panel-2);border-bottom:1px solid var(--line);gap:16px;flex-wrap:wrap}
.sub-hdr .sub-l{display:flex;flex-direction:column;gap:2px}
.sub-hdr .sub-l h2{font-size:14.5px;font-weight:700;color:var(--blue-dk)}
.sub-hdr .sub-l .sub-meta{font-size:11px;color:var(--ink-faint);font-family:'SF Mono',Consolas,monospace}
.sub-hdr .sub-r{text-align:right;font-family:'SF Mono',Consolas,monospace;font-size:12.5px;line-height:1.7;font-weight:600}
.sub-hdr .sub-r .kv13{color:#0f7a3a}
.sub-hdr .sub-r .kw{color:var(--blue)}
.sub-hdr .sub-r .kv69{color:#7c3aed;font-size:11.5px}
.sub-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;padding:14px}

/* ── Feeder cards ── */
.fdr{background:var(--panel-2);border-radius:10px;padding:13px 15px;border-left:4px solid var(--line);transition:.15s;border:1px solid var(--line)}
.fdr:hover{background:#eef2f7;box-shadow:0 2px 6px rgba(15,23,42,.06)}
.fdr .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fdr .hdr .nm{font-size:13px;font-weight:700;font-family:'SF Mono',Consolas,monospace}
.fdr .hdr .tag{font-size:9px;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:.3px}
.tag-on{background:var(--green-lt);color:#0f7a3a}
.tag-tr{background:var(--red-lt);color:var(--red)}
.tag-off{background:#eceff3;color:var(--ink-faint)}
.fdr .row{display:flex;gap:10px;flex-wrap:wrap;font-size:11.5px;font-family:'SF Mono',Consolas,monospace}
.fdr .row span{white-space:nowrap;font-weight:600}
.fdr .row .i{color:#0a5ca8} .fdr .row .p{color:#b8860b} .fdr .row .pf{color:#7c3aed}
.fdr.off .row span,.fdr .row .m{color:#94a3b8!important;font-weight:500}
.fdr.tripped .row span{color:#c0392b!important}

/* ── Footer ── */
#foot{text-align:center;font-size:11px;color:var(--ink-faint);padding:18px 0 6px}

/* ── Responsive ── */
@media(max-width:600px){
  .sub-body{grid-template-columns:1fr}
  .kpi{min-width:120px}
  #kpi-row{flex-direction:column}
  #head h1{margin-left:0;width:100%}
}
</style>
</head>

<script>
// ── Lookup tables (mirrors sld_client.py) ──
const SUB_NAMES={M1:"MATALAM",M2:"PACO",M3:"BAGONG SILANG",M4:"KIDAPAWAN",M5:"BAGONTAPAY",M6:"KABACAN",M7:"ANTIPAS",M8:"CARMEN",M9:"KALASUYAN",M10:"TULUNAN"};
const SUB_ORDER=["M9","M2","M7","M4","M3","M1","M6","M8","M10","M5"];
const TAC_SUBS=new Set(["M5","M10"]);
const FEEDER_GROUPS={M1:["f11","f12","f13"],M2:["f21","f22","f23"],M3:["f31","f32","f33","f34"],M4:["f41","f42","f43","f44"],M5:["f51","f52","f53","f54"],M6:["f61","f62","f63","f64","f65"],M7:["f71","f72","f73"],M8:["f82","f83","f84"],M9:["f91","f92","f93","f94","f95"],M10:["f101","f102","f103","f104"]};

let lastData=null;
const kpiRow=document.getElementById("kpi-row");
const subsEl=document.getElementById("subs-container");

// ── Render substation structure (static, one time) ──
function renderStructure(){
  let html="";
  for(const sid of SUB_ORDER){
    const nm=SUB_NAMES[sid]||sid;
    const fids=FEEDER_GROUPS[sid]||[];
    const cnt=fids.length;
    html+='<div class="sub" id="sub-'+sid+'">'+
      '<div class="sub-hdr"><div class="sub-l"><h2>'+sid+' — '+nm+'</h2><span class="sub-meta">'+cnt+' feeders</span></div><div class="sub-r" id="subr-'+sid+'"><span class="m">—</span></div></div>'+
      '<div class="sub-body" id="subb-'+sid+'">';
    for(const fid of fids){
      html+='<div class="fdr" id="fdr-'+fid+'" data-fid="'+fid+'">'+
        '<div class="hdr"><span class="nm" id="nm-'+fid+'">'+fid.toUpperCase()+'</span><span class="tag" id="tag-'+fid+'">—</span></div>'+
        '<div class="row" id="row-'+fid+'"><span class="m">—</span></div></div>';
    }
    html+='</div></div>';
  }
  subsEl.innerHTML=html;
}

// ── Update everything from data ──
function updateUI(data){
  if(!data?.data)return;
  const readings=data.data.readings||{};
  const hv69kv=data.data.hv69kv||{};

  // Compute totals
  let sysKW=0,sysKVAR=0,apoKW=0,tacKW=0,active=0,tripped=0,total=0;
  for(const[fid,r]of Object.entries(readings)){
    total++;
    sysKW+=r.p||0; sysKVAR+=r.q||0;
    const sid=(r.sub_id||"").toUpperCase();
    if(TAC_SUBS.has(sid))tacKW+=r.p||0; else apoKW+=r.p||0;
    if(r.tripped)tripped++; else if(r.has_voltage||(r.p||0)>1)active++;
  }

  // ── KPI row ──
  const pct=sysKW>0?Math.min(100,(sysKW/100000)*100):0;
  kpiRow.innerHTML=
    '<div class="kpi" style="border-top-color:#0a5ca8"><div class="lbl">System kW Demand</div><div class="val" style="color:'+(sysKW>80000?"#c0392b":sysKW>60000?"#9a6b00":"#0f7a3a")+'">'+fmt(sysKW)+'</div></div>'+
    '<div class="kpi" style="border-top-color:#7c3aed"><div class="lbl">System kVAR Demand</div><div class="val" style="color:#7c3aed">'+fmt(sysKVAR)+'</div></div>'+
    '<div class="kpi" style="border-top-color:#0a5ca8"><div class="lbl">NGCP — APO</div><div class="val" style="color:#0a5ca8">'+fmt(apoKW)+'</div></div>'+
    '<div class="kpi" style="border-top-color:#073e73"><div class="lbl">NGCP — TACURONG</div><div class="val" style="color:'+(tacKW>0?"#073e73":"#94a3b8")+'">'+fmt(tacKW)+'</div></div>'+
    '<div class="kpi" style="border-top-color:'+(tripped?'#c0392b':'#1a9b4c')+'"><div class="lbl">Feeders</div><div class="val" style="color:'+(tripped?'#c0392b':'#0f7a3a')+'">'+active+' <span style="font-size:14px;color:#94a3b8">/ '+total+'</span></div></div>';

  // ── Per-substation stats (13.2kV from 2nd feeder, kW sum, 69kV for M6/M8) ──
  for(const sid of SUB_ORDER){
    const fids=FEEDER_GROUPS[sid]||[];
    const subEl=document.getElementById("subr-"+sid);
    if(!subEl)continue;

    // 13.2kV from 2nd feeder
    const f2=fids[1];
    const r2=f2?readings[f2]:null;
    const kv13=r2&&r2.kv?r2.kv:null;

    // kW sum
    let kwSum=0;
    for(const fid of fids){const r=readings[fid];if(r)kwSum+=r.p||0;}

    // 69kV for M6/M8 — three phase values
    const hv=hv69kv["m"+sid.slice(1).toLowerCase()]||hv69kv[sid.toLowerCase()];
    let parts=[];
    if(kv13!==null)parts.push('<span class="kv13">'+kv13.toFixed(2)+' kV</span>');
    parts.push('<span class="kw">'+fmt(kwSum)+' kW</span>');
    if(hv&&hv.vab!=null&&hv.vbc!=null&&hv.vca!=null){
      const kab=hv.vab/1000, kbc=hv.vbc/1000, kca=hv.vca/1000;
      const avgKv=(kab+kbc+kca)/3;
      const hvClr=65<=avgKv&&avgKv<=73?'#0f7a3a':'#9a6b00';
      const hz=hv.freq!=null?hv.freq.toFixed(2)+' Hz':'';
      parts.push('<span class="kv69" style="color:'+hvClr+'">'+kab.toFixed(1)+'/'+kbc.toFixed(1)+'/'+kca.toFixed(1)+' kV'+(hz?' '+hz:'')+'</span>');
    }
    subEl.innerHTML=parts.join(' &nbsp;|&nbsp; ');
  }

  // ── Feeder cards ──
  for(const[fid,r]of Object.entries(readings)){
    const tc=r.tripped,nc=r.no_connection,act=r.has_voltage&&r.has_current;
    const card=document.getElementById("fdr-"+fid);
    const nmEl=document.getElementById("nm-"+fid);
    const tagEl=document.getElementById("tag-"+fid);
    const rowEl=document.getElementById("row-"+fid);
    if(!card||!tagEl||!rowEl)continue;

    let tagCls,tagTxt,clr,isOff=false,isTripped=false;
    if(nc||(!r.has_voltage&&!r.has_current)){tagCls="tag-off";tagTxt="OFF";clr="#94a3b8";isOff=true;}
    else if(tc){tagCls="tag-tr";tagTxt="TRIPPED";clr="#c0392b";isTripped=true;}
    else if(act){tagCls="tag-on";tagTxt="ON";clr="#1a9b4c";}
    else{tagCls="tag-on";tagTxt="IDLE";clr="#b8860b";}

    card.style.borderLeftColor=clr;
    card.classList.toggle("tripped",isTripped);
    card.classList.toggle("off",isOff);
    tagEl.className="tag "+tagCls;tagEl.textContent=tagTxt;
    if(nmEl)nmEl.style.color=clr;

    rowEl.innerHTML=
      '<span class="i">L1:'+(r.i1||0).toFixed(1)+' L2:'+(r.i2||0).toFixed(1)+' L3:'+(r.i3||0).toFixed(1)+' A</span>'+
      '<span class="p">'+(r.p||0).toFixed(1)+' kW</span>'+
      '<span class="pf">PF '+(r.pf||0).toFixed(3)+'</span>';
  }
}

function fmt(v){return (v||0).toLocaleString(void 0,{maximumFractionDigits:1})}
function objLen(o){let n=0;for(const k in o)if(Object.prototype.hasOwnProperty.call(o,k))n++;return n}
function NGCP_APO_SUBS(){const s={};for(const k in SUB_NAMES)if(!TAC_SUBS.has(k))s[k]=1;return s}

// ── Poll ──
async function poll(){
  try{
    const r=await fetch("/data");
    if(!r.ok)throw Error(r.status);
    const d=await r.json();
    if(JSON.stringify(d)===JSON.stringify(lastData))return;
    lastData=d;
    document.getElementById("ts").textContent=new Date().toLocaleTimeString();
    document.getElementById("stat").className="on";
    document.getElementById("stat").textContent="LIVE";
    updateUI(d);
  }catch(e){
    document.getElementById("stat").className="off";
    document.getElementById("stat").textContent="OFFLINE";
  }
}

renderStructure();
setInterval(poll,2000);poll();
</script>
</body></html>
